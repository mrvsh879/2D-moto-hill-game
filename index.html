<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Moto Ridge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div><b>MOTO RIDGE</b><span id="meters">0 м</span></div>
    <div><span id="time">00:00.00</span><span id="best"></span></div>
  </div>
  <div id="message" class="message hidden">
    <h1>CRASH</h1>
    <p>Нажми Restart или R</p>
  </div>
  <button id="restart" class="restart">Restart</button>
  <div class="keys">← тормоз · → газ · A/D баланс · R рестарт</div>
  <div class="touch left">
    <button data-key="ArrowLeft">⟵</button>
    <button data-key="KeyA">A</button>
  </div>
  <div class="touch right">
    <button data-key="KeyD">D</button>
    <button data-key="ArrowRight">⟶</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
