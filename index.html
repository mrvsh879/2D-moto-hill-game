<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Moto Hill Physics</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f7f7f7;
      font-family: Arial, sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
      background: #fff;
    }
    .ui {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 120px;
      pointer-events: none;
    }
    .btn {
      position: absolute;
      bottom: 16px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid #222;
      background: rgba(255,255,255,.75);
      font-size: 13px;
      font-weight: bold;
      pointer-events: auto;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #brake { left: 16px; }
    #gas { right: 16px; }
    #leanL { left: 105px; }
    #leanR { right: 105px; }
    #restart {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 9px 12px;
      border: 1px solid #222;
      background: white;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <button id="restart">Restart</button>
  <div class="ui">
    <div class="btn" id="brake">BRAKE</div>
    <div class="btn" id="leanL">◀</div>
    <div class="btn" id="leanR">▶</div>
    <div class="btn" id="gas">GAS</div>
  </div>
  <script src="game.js"></script>
</body>
</html>
